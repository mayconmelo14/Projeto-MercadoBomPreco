<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- Box Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- Media -->
    <link rel="stylesheet" href="./css/media.css">

    <!-- Ícone do Site -->
    <link rel="shortcut icon" href="./img/Logo.png" type="image/x-icon">

    <title>Mercado Bom Preço</title>
</head>

<body>

    <!-- Cabeçalho -->
    <header class="header">
        <div class="logo">
            <img src="./img/Logo.png" alt="Bom Preço">
        </div>
        <div class="cart">
            <i class='bx bxs-cart'></i>
        </div>
        <div class="menu">
            <i class='bx bx-menu'></i>
        </div>
    </header>

    <main>

        <!-- Barra de pesquisa -->
        <section class="search-section">
            <div class="search-box">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Buscar produtos">
            </div>
        </section>

        <!-- Banner Principal -->
        <section class="hero">
            <div class="hero-content"></div>
        </section>

        <!-- Categorias -->
        <section class="categories-section">
            <div class="section-header">
                <h2 class="section-title">Categorias</h2>
            </div>

            <div class="row row-cols-4 row-cols-md-4 row-cols-desktop-8 g-2 categories-row">

                <div class="col">
                    <div class="category-card">
                        <div class="category-icon">
                            <i class="bx bxs-lemon"></i>
                        </div>
                        <p>Frutas</p>
                    </div>
                </div>

                <div class="col">
                    <div class="category-card">
                        <div class="category-icon">
                            <i class="bx bxs-drink"></i>
                        </div>
                        <p>Bebidas</p>
                    </div>
                </div>

                <div class="col">
                    <div class="category-card">
                        <div class="category-icon">
                            <i class="bx bxs-cookie"></i>
                        </div>
                        <p>Padaria</p>
                    </div>
                </div>

                <div class="col">
                    <div class="category-card">
                        <div class="category-icon">
                            <i class="bx bxs-food-menu"></i>
                        </div>
                        <p>Carnes</p>
                    </div>
                </div>

                <div class="col">
                    <div class="category-card">
                        <div class="category-icon">
                            <i class="bx bxs-spray-can"></i>
                        </div>
                        <p>Limpeza</p>
                    </div>
                </div>

                <div class="col">
                    <div class="category-card">
                        <div class="category-icon">
                            <i class='bx bxs-leaf'></i>
                        </div>
                        <p>Hortifruti</p>
                    </div>
                </div>

                <div class="col">
                    <div class="category-card">
                        <div class="category-icon">
                            <i class='bx bxs-purchase-tag'></i>
                        </div>
                        <p>Ofertas</p>
                    </div>
                </div>

                <div class="col">
                    <div class="category-card">
                        <div class="category-icon">
                            <i class='bx bxs-basket'></i>
                        </div>
                        <p>Mais Vendidos</p>
                    </div>
                </div>

            </div>
        </section>

        <!-- Produtos em Destaque -->
        <section class="featured-products">
            <div class="section-header">
                <h2 class="section-title">Produtos em Destaque</h2>
            </div>

            <div class="products-grid">
                <div class="product-card"></div>
                <div class="product-card"></div>
                <div class="product-card"></div>
                <div class="product-card"></div>
            </div>

            <div class="card product-card" style="width: 18rem;">
                <img src="./img/Produtos/Sprite-Lata.png" class="card-img-top" alt="Sprite">
                <div class="card-body">
                    <h5 class="card-title">Sprite Limão 350ml</h5>
                    <p class="card-text"></p>
                    <p class="product-price">R$ 3,99</p>
                    <a href="#" class="btn btn-primary">
                        Comprar
                    </a>
                    <a href="#" class="btn btn-primary">
                        Adicionar
                        <i class='bx bxs-cart-add'></i>
                    </a>
                </div>
            </div>


        </section>

        <!-- Ofertas -->
        <section class="offers">
            <div class="section-title"></div>

            <div class="offer-banner"></div>
        </section>

        <!-- Benefícios -->
        <section class="benefits">
            <div class="benefit-card"></div>
            <div class="benefit-card"></div>
            <div class="benefit-card"></div>
        </section>

        <!-- Chamada para ação -->
        <section class="cta">
            <div class="cta-content"></div>
        </section>

    </main>

    <!-- Rodapé -->
    <footer class="footer">

        <div class="footer-logo"></div>

        <div class="footer-links"></div>

        <div class="footer-contact"></div>

        <div class="footer-social"></div>

    </footer>

    <!-- Script Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
